name: k_gamingxcafe
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Utility
  dropdown_search: ^7.0.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4

  # File & Storage
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  open_filex: ^4.7.0
  share_plus: ^12.0.1
  file_picker: ^8.1.2

  # Database
  sqflite: ^2.4.2

  # Export
  pdf: ^3.12.0
  excel: ^4.0.6
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/iconLauncher.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0b1220"
  adaptive_icon_foreground: "assets/images/iconLauncher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
